name: Auto-Brief

# 뉴스 RSS 수집 → Gemini 요약 → content/briefs 발행 → 커밋(→ Vercel 자동 재배포)

on:
  schedule:
    # KST 07:00 / 16:00 / 22:00  (UTC 22:00 / 07:00 / 13:00)
    - cron: "0 22 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "발행 모드"
        type: choice
        options: [draft, publish]
        default: draft
      dry_run:
        description: "커밋 없이 로그만 (true/false)"
        type: boolean
        default: false

concurrency:
  group: auto-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # push 전 rebase가 안전하게 되도록 전체 히스토리를 받아온다.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install automation deps
        working-directory: automation
        run: npm install --no-audit --no-fund

      - name: Generate briefs
        id: gen
        working-directory: automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          AUTO_BRIEF_MODE: ${{ github.event.inputs.mode || 'draft' }}
          CONFIDENCE_THRESHOLD: ${{ vars.CONFIDENCE_THRESHOLD }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node generate-briefs.mjs

      - name: Commit & push
        if: steps.gen.outputs.published != '0' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "auto-brief-bot"
          git config user.email "actions@github.com"
          git add content/briefs automation/briefs-seen.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            COUNT="${{ steps.gen.outputs.published }}"
            git commit -m "bot: publish ${COUNT} brief(s) [$(date -u +%Y-%m-%dT%H:%MZ)]"
            # 실행 도중 main이 갱신됐을 수 있으므로 rebase 후 push, 실패 시 재시도.
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              echo "push 재시도 ${i}..."; sleep 5
            done
            echo "push 최종 실패"; exit 1
          fi
